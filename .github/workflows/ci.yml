name: CI

on:
  push:
    branches: [ homework ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run all tests (including data checks)
      run: make test
    - name: Run dedicated data contract checks
      run: make data-check
    - name: Eval gate (placeholder)
      run: make eval-gate