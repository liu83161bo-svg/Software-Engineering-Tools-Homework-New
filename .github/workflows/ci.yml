name: CI

on:
  push:
    branches: [ homework ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: make setup
    - name: Secret scanning with gitleaks (file scan)
      run: |
        curl -sSfL https://github.com/zricethezav/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz -C /tmp
        chmod +x /tmp/gitleaks
        /tmp/gitleaks detect --redact -v --no-git --report-format=sarif --report-path=gitleaks-results.sarif
    - name: Run unit tests
      run: make test
    - name: Run data quality checks
      run: make data-check
    - name: Run evaluation gate
      run: make eval-gate
    - name: Run SLO gate
      run: make slo-gate
    - name: Run safety tests
      run: make test-safety
    - name: Run LLM release gates
      run: make llm-gates